name: Agent Sync
description: Mirror canonical agent sources and vendor registered skills.
author: julien777z

branding:
  icon: refresh-cw
  color: purple

inputs:
  github-token:
    description: Token used to commit and push changes (or open a pull request).
    default: ${{ github.token }}
  refresh-external-skills:
    description: Force vendoring external skills from the registry before mirroring.
    default: "false"
  mode:
    description: How to persist changes — commit (push to the branch) or pull-request.
    default: commit
  agents-dir:
    description: Source-of-truth directory name; the registry is read from <agents-dir>/skills.json.
    default: .agents
  dry-run:
    description: Report changes without writing or committing; fails if anything is out of sync.
    default: "false"

runs:
  using: composite
  steps:
    - name: Decide external-skill refresh
      id: refresh
      shell: bash
      run: |
        set -uo pipefail
        enabled=false
        if [ "${{ inputs.refresh-external-skills }}" = "true" ]; then
          enabled=true
        elif [ "${{ github.event_name }}" = "push" ]; then
          before="${{ github.event.before }}"
          if [ -n "$before" ] && ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            git fetch --depth=1 origin "$before" 2>/dev/null || true
          fi
          if [ -n "$before" ] && git cat-file -e "${before}^{commit}" 2>/dev/null \
             && git diff --name-only "$before" "${{ github.sha }}" \
                  | grep -qx "${{ inputs.agents-dir }}/skills.json"; then
            enabled=true
          fi
        fi
        echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

    - name: Read Node version
      if: ${{ steps.refresh.outputs.enabled == 'true' }}
      id: node
      shell: bash
      run: |
        node_version="$(tr -d '[:space:]' < "$GITHUB_ACTION_PATH/.nvmrc")"
        echo "version=$node_version" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ${{ github.action_path }}/.python-version

    - name: Set up Node
      if: ${{ steps.refresh.outputs.enabled == 'true' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.node.outputs.version }}

    - name: Install dependencies
      shell: bash
      run: python -m pip install --disable-pip-version-check "$GITHUB_ACTION_PATH"

    - name: Vendor external skills
      if: ${{ steps.refresh.outputs.enabled == 'true' }}
      shell: bash
      run: python -m agent_sync vendor-skills --root . --agents-dir "${{ inputs.agents-dir }}" ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}

    - name: Run agent sync
      shell: bash
      run: python -m agent_sync mirror-providers --root . --agents-dir "${{ inputs.agents-dir }}" ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}

    - name: Persist changes
      if: ${{ inputs.dry-run != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Drive git (not just gh) with the provided token so pushes use it; the
        # checkout's stored header would otherwise override the remote URL creds.
        git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        for path in .claude .cursor .codex "${{ inputs.agents-dir }}" AGENTS.md AGENTS.override.md; do
          if [ -e "$path" ]; then
            git add -A -- "$path"
          fi
        done

        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        if [ "$MODE" = "pull-request" ]; then
          branch="agent-sync/${{ github.ref_name }}"
          git commit -m "chore: run agent sync"
          git push --force origin "HEAD:$branch"
          if ! gh pr view "$branch" >/dev/null 2>&1; then
            gh pr create --base "${{ github.ref_name }}" --head "$branch" \
              --title "chore: agent sync" \
              --body "Automated Agent Sync update (provider mirroring and skill vendoring)."
          fi
        else
          git commit -m "chore: run agent sync"
          pre_rebase_head="$(git rev-parse HEAD)"
          git pull --rebase origin "${{ github.ref_name }}"

          if ! git diff --quiet "$pre_rebase_head" HEAD -- "${{ inputs.agents-dir }}/skills.json"; then
            python -m agent_sync vendor-skills --root . --agents-dir "${{ inputs.agents-dir }}"
          fi
          python -m agent_sync mirror-providers --root . --agents-dir "${{ inputs.agents-dir }}"

          for path in .claude .cursor .codex "${{ inputs.agents-dir }}" AGENTS.md AGENTS.override.md; do
            if [ -e "$path" ]; then
              git add -A -- "$path"
            fi
          done
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

          git push origin "HEAD:${{ github.ref_name }}"
        fi

    - name: Verify sync idempotence
      if: ${{ inputs.dry-run != 'true' }}
      shell: bash
      run: python -m agent_sync mirror-providers --root . --agents-dir "${{ inputs.agents-dir }}" --dry-run
