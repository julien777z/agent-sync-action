name: Agent Sync
description: Disperse .agents into Claude/Cursor/Codex folders and refresh skills.sh skills.
author: julien777z

branding:
  icon: refresh-cw
  color: purple

inputs:
  github-token:
    description: Token used to commit and push changes (or open a pull request).
    default: ${{ github.token }}
  refresh-external-skills:
    description: Force reinstalling external skills from the registry before dispersal.
    default: "false"
  mode:
    description: How to persist changes — commit (push to the branch) or pull-request.
    default: commit
  agents-dir:
    description: Source-of-truth directory name; the registry is read from <agents-dir>/skills.json.
    default: .agents
  dry-run:
    description: Report changes without writing or committing; fails if anything is out of sync.
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies
      shell: bash
      run: python -m pip install --disable-pip-version-check -r "$GITHUB_ACTION_PATH/requirements.txt"

    - name: Decide external-skill refresh
      id: refresh
      shell: bash
      run: |
        set -uo pipefail
        if [ "${{ inputs.refresh-external-skills }}" = "true" ]; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        elif [ "${{ github.event_name }}" = "push" ] && \
             git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null \
               | grep -qx "${{ inputs.agents-dir }}/skills.json"; then
          echo "enabled=true" >> "$GITHUB_OUTPUT"
        else
          echo "enabled=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Refresh external skills
      if: ${{ steps.refresh.outputs.enabled == 'true' }}
      shell: bash
      run: PYTHONPATH="$GITHUB_ACTION_PATH/src" python -m agent_sync refresh --root . --agents-dir "${{ inputs.agents-dir }}" ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}

    - name: Run agent sync
      shell: bash
      run: PYTHONPATH="$GITHUB_ACTION_PATH/src" python -m agent_sync sync --root . --agents-dir "${{ inputs.agents-dir }}" ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}

    - name: Persist changes
      if: ${{ inputs.dry-run != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        for path in .claude .cursor .codex "${{ inputs.agents-dir }}" AGENTS.override.md; do
          if [ -e "$path" ]; then
            git add -A -- "$path"
          fi
        done

        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        if [ "$MODE" = "pull-request" ]; then
          branch="agent-sync/${{ github.ref_name }}"
          git commit -m "chore: run agent sync"
          git push --force origin "HEAD:$branch"
          if ! gh pr view "$branch" >/dev/null 2>&1; then
            gh pr create --base "${{ github.ref_name }}" --head "$branch" \
              --title "chore: agent sync" \
              --body "Automated agent sync (dispersal + external-skill refresh)."
          fi
        else
          git commit -m "chore: run agent sync"

          # Integrate any commits that landed during the run, then regenerate the
          # mirrors against the rebased sources so the pushed tree stays consistent.
          git pull --rebase origin "${{ github.ref_name }}"
          PYTHONPATH="$GITHUB_ACTION_PATH/src" python -m agent_sync sync --root . --agents-dir "${{ inputs.agents-dir }}"
          for path in .claude .cursor .codex "${{ inputs.agents-dir }}" AGENTS.override.md; do
            if [ -e "$path" ]; then git add -A -- "$path"; fi
          done
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

          git push origin "HEAD:${{ github.ref_name }}"
        fi

    - name: Verify sync idempotence
      if: ${{ inputs.dry-run != 'true' && inputs.mode == 'commit' }}
      shell: bash
      run: PYTHONPATH="$GITHUB_ACTION_PATH/src" python -m agent_sync sync --root . --agents-dir "${{ inputs.agents-dir }}" --dry-run
