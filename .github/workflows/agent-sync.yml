name: Agent Sync (reusable)

on:
  workflow_call:
    inputs:
      refresh_external_skills:
        description: "Reinstall external (skills.sh) skills from the registry before dispersal."
        type: boolean
        default: false
      mode:
        description: "How to persist changes: 'commit' (push to the branch) or 'pull-request'."
        type: string
        default: commit
      agents_dir:
        description: "Source-of-truth directory name."
        type: string
        default: .agents
      dry_run:
        description: "Report changes without writing/committing (fails if out of sync)."
        type: boolean
        default: false
    secrets:
      token:
        description: "Token used to push or open PRs. Defaults to the job's GITHUB_TOKEN."
        required: false

jobs:
  agent-sync:
    name: Agent Sync
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Resolve action repo and ref
        id: action
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.job_workflow_ref }}"
          echo "repo=${ref%%/.github/*}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref##*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.token || github.token }}

      - name: Checkout agent-sync-action
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.action.outputs.repo }}
          ref: ${{ steps.action.outputs.ref }}
          path: .agent-sync

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: python -m pip install "pydantic>=2.0.0,<3" "pyyaml>=6.0.0" "rich>=14.0.0"

      - name: Refresh external skills
        if: ${{ inputs.refresh_external_skills }}
        run: python .agent-sync/external_skills.py --root . --agents-dir "${{ inputs.agents_dir }}" ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Run agent sync
        run: python .agent-sync/agent_sync.py --root . --agents-dir "${{ inputs.agents_dir }}" ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Persist changes
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for path in .claude .cursor .codex "${{ inputs.agents_dir }}" AGENTS.override.md; do
            if [ -e "$path" ]; then
              git add -A -- "$path"
            fi
          done

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          if [ "$MODE" = "pull-request" ]; then
            branch="agent-sync/refresh-${{ github.run_id }}"
            git checkout -b "$branch"
            git commit -m "chore: run agent sync"
            git push --force-with-lease origin "$branch"
            if ! gh pr view "$branch" >/dev/null 2>&1; then
              gh pr create --base "${{ github.ref_name }}" --head "$branch" \
                --title "chore: agent sync" \
                --body "Automated agent sync (dispersal + external-skill refresh)."
            fi
          else
            git commit -m "chore: run agent sync"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Verify sync idempotence
        if: ${{ !inputs.dry_run && inputs.mode == 'commit' }}
        run: python .agent-sync/agent_sync.py --root . --agents-dir "${{ inputs.agents_dir }}" --dry-run
