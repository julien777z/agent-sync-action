name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install "pydantic>=2.0.0,<3" "pyyaml>=6.0.0" "rich>=14.0.0" "pytest>=8.0"
      - run: python -m pytest
